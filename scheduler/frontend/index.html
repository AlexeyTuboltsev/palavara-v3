<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Book a Wheel-Throwing Workshop — Palavara</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-wrapper">
    <header class="site-header">
      <a href="https://studio.palavara.com/" class="logo-link" aria-label="Palavara Studio">
        <img src="logo.svg" alt="Palavara" class="logo" />
      </a>
      <p class="header-title" id="headerTitle"></p>
    </header>

    <main class="booking-container">

      <!-- ── Step 1: Pick a date ────────────────────────────────────────── -->
      <section id="step-date" class="step active" data-step="1">
        <div class="step-body">
          <!-- Desktop: month calendar with slots inside each day -->
          <div class="calendar-view">
            <div class="calendar-header">
              <button type="button" class="cal-nav" id="calPrev" aria-label="Previous month">←</button>
              <span class="cal-month-label" id="calMonthLabel"></span>
              <button type="button" class="cal-nav" id="calNext" aria-label="Next month">→</button>
            </div>
            <div class="calendar-weekdays" aria-hidden="true">
              <span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span>
            </div>
            <div class="calendar-grid" id="calendarGrid" role="grid" aria-label="Workshop dates"></div>
          </div>

          <!-- Mobile: scrollable list of dates with drawer-style slot reveal -->
          <ul class="date-list" id="dateList" aria-label="Workshop dates"></ul>

          <p id="dateError" class="error-msg hidden"></p>
        </div>

        <div class="step-actions">
          <button type="button" class="btn btn-ghost" data-action="cancel">Cancel</button>
        </div>
      </section>

      <!-- ── Step 2: Fill in details ───────────────────────────────────── -->
      <section id="step-form" class="step hidden" data-step="2">
        <div class="step-body">
          <p class="step-context">
            <span id="summaryDate"></span> &middot; <span id="summarySlot"></span>
          </p>
          <form id="bookingForm" novalidate>
            <div class="form-row">
              <div class="form-group">
                <label for="studentName">Name</label>
                <input
                  type="text"
                  id="studentName"
                  name="studentName"
                  autocomplete="name"
                  placeholder="Jane Smith"
                  required
                  minlength="2"
                  maxlength="99"
                />
              </div>
              <div class="form-group">
                <label for="studentEmail">Email</label>
                <input
                  type="email"
                  id="studentEmail"
                  name="studentEmail"
                  autocomplete="email"
                  placeholder="jane@example.com"
                  required
                />
              </div>
            </div>
            <div class="form-group">
              <label for="studentPhone">Phone <span class="optional">(optional)</span></label>
              <input
                type="tel"
                id="studentPhone"
                name="studentPhone"
                autocomplete="tel"
                placeholder="+49 …"
              />
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="lessonType">Lesson type</label>
                <select id="lessonType" name="lessonType" required>
                  <option value="">Loading…</option>
                </select>
              </div>
              <div class="form-group hidden" id="personsGroup">
                <label for="numPersons">For how many people</label>
                <input
                  type="number"
                  id="numPersons"
                  name="numPersons"
                  step="1"
                />
              </div>
            </div>
            <div class="form-group">
              <label for="comment">Comment <span class="optional">(optional)</span></label>
              <textarea
                id="comment"
                name="comment"
                rows="3"
                maxlength="500"
                placeholder="Anything we should know?"
              ></textarea>
            </div>
            <p id="formError" class="error-msg hidden"></p>
          </form>
        </div>

        <div class="step-actions">
          <button type="button" class="btn btn-ghost" data-action="back">Back</button>
          <button type="submit" form="bookingForm" id="bookBtn" class="btn btn-paypal" disabled>
            Pay with PayPal — <span id="bookPrice">€95.00</span>
          </button>
          <button type="button" class="btn btn-ghost" data-action="cancel">Cancel</button>
        </div>
      </section>

      <!-- ── Spinner / loading state ───────────────────────────────────── -->
      <div id="loadingOverlay" class="loading-overlay hidden" aria-live="polite">
        <div class="spinner"></div>
        <p id="loadingMsg">Loading…</p>
      </div>

    </main>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
