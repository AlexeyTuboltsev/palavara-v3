<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title data-i18n="page.title">Book a class — Palavara Studio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-wrapper">
    <header class="site-header">
      <a href="https://studio.palavara.com/" class="logo-link" aria-label="Palavara Studio">
        <img src="logo.svg" alt="Palavara" class="logo" />
      </a>
      <p class="header-title" id="headerTitle"></p>
    </header>

    <main class="booking-container">

      <!-- ── Step 1: Pick a date ────────────────────────────────────────── -->
      <section id="step-date" class="step active" data-step="1">
        <div class="step-body">
          <!-- Desktop: month calendar with slots inside each day -->
          <div class="calendar-view">
            <div class="calendar-header">
              <button type="button" class="cal-nav" id="calPrev"
                      data-i18n="[aria-label]datePicker.calendarPrev"
                      aria-label="Previous month">←</button>
              <span class="cal-month-label" id="calMonthLabel"></span>
              <button type="button" class="cal-nav" id="calNext"
                      data-i18n="[aria-label]datePicker.calendarNext"
                      aria-label="Next month">→</button>
            </div>
            <div class="calendar-weekdays" aria-hidden="true">
              <span data-i18n="datePicker.weekdays.mon">Mon</span><span data-i18n="datePicker.weekdays.tue">Tue</span><span data-i18n="datePicker.weekdays.wed">Wed</span><span data-i18n="datePicker.weekdays.thu">Thu</span><span data-i18n="datePicker.weekdays.fri">Fri</span><span data-i18n="datePicker.weekdays.sat">Sat</span><span data-i18n="datePicker.weekdays.sun">Sun</span>
            </div>
            <div class="calendar-grid" id="calendarGrid" role="grid"
                 data-i18n="[aria-label]datePicker.ariaWorkshopDates"
                 aria-label="Workshop dates"></div>
          </div>

          <!-- Mobile: scrollable list of dates with drawer-style slot reveal -->
          <ul class="date-list" id="dateList"
              data-i18n="[aria-label]datePicker.ariaWorkshopDates"
              aria-label="Workshop dates"></ul>

          <p id="dateError" class="error-msg hidden"></p>
        </div>

        <div class="step-actions">
          <button type="button" class="btn btn-ghost" data-action="cancel"
                  data-i18n="common.cancel">Cancel</button>
        </div>
      </section>

      <!-- ── Step 2: Fill in details ───────────────────────────────────── -->
      <section id="step-form" class="step hidden" data-step="2">
        <div class="step-body">
          <p class="step-context">
            <span id="summaryDate"></span> &middot; <span id="summarySlot"></span>
          </p>
          <form id="bookingForm" novalidate>
            <div class="form-row">
              <div class="form-group">
                <label for="studentName" data-i18n="form.name.label">Name</label>
                <input
                  type="text"
                  id="studentName"
                  name="studentName"
                  autocomplete="name"
                  data-i18n="[placeholder]form.name.placeholder"
                  placeholder="Jane Smith"
                  required
                  minlength="2"
                  maxlength="99"
                />
              </div>
              <div class="form-group">
                <label for="studentEmail" data-i18n="form.email.label">Email</label>
                <input
                  type="email"
                  id="studentEmail"
                  name="studentEmail"
                  autocomplete="email"
                  data-i18n="[placeholder]form.email.placeholder"
                  placeholder="jane@example.com"
                  required
                />
              </div>
            </div>
            <div class="form-group">
              <label for="studentPhone">
                <span data-i18n="form.phone.label">Phone</span>
                <span class="optional" data-i18n="common.optional">(optional)</span>
              </label>
              <input
                type="tel"
                id="studentPhone"
                name="studentPhone"
                autocomplete="tel"
                data-i18n="[placeholder]form.phone.placeholder"
                placeholder="+49 …"
              />
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="lessonType" data-i18n="form.lessonType.label">Lesson type</label>
                <select id="lessonType" name="lessonType" required>
                  <option value="" data-i18n="form.lessonType.loading">Loading…</option>
                </select>
              </div>
              <div class="form-group hidden" id="personsGroup">
                <label for="numPersons" data-i18n="form.numPersons.label">For how many people</label>
                <input
                  type="number"
                  id="numPersons"
                  name="numPersons"
                  step="1"
                />
              </div>
            </div>
            <div class="form-group">
              <label for="comment">
                <span data-i18n="form.comment.label">Comment</span>
                <span class="optional" data-i18n="common.optional">(optional)</span>
              </label>
              <textarea
                id="comment"
                name="comment"
                rows="3"
                maxlength="500"
                data-i18n="[placeholder]form.comment.placeholder"
                placeholder="Anything we should know?"
              ></textarea>
            </div>
            <p id="formError" class="error-msg hidden"></p>
          </form>
        </div>

        <div class="step-actions">
          <button type="button" class="btn btn-ghost" data-action="back"
                  data-i18n="common.back">Back</button>
          <button type="submit" form="bookingForm" id="bookBtn" class="btn btn-paypal" disabled>
            <!-- bookBtn label is fully dynamic — set by app.js via i18next.t('form.submitWithPrice', {price}) -->
            <span id="bookBtnLabel">Pay with PayPal — <span id="bookPrice">€95.00</span></span>
          </button>
          <button type="button" class="btn btn-ghost" data-action="cancel"
                  data-i18n="common.cancel">Cancel</button>
        </div>
      </section>

      <!-- ── Spinner / loading state ───────────────────────────────────── -->
      <div id="loadingOverlay" class="loading-overlay hidden" aria-live="polite">
        <div class="spinner"></div>
        <p id="loadingMsg" data-i18n="common.loading">Loading…</p>
      </div>

    </main>
  </div>

  <script src="vendor/i18next.min.js"></script>
  <script src="vendor/i18nextBrowserLanguageDetector.min.js"></script>
  <script src="vendor/i18nextHttpBackend.min.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
  <script src="i18n.js"></script>
</body>
</html>
