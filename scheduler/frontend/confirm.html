<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Workshop Booked — Palavara</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-wrapper">
    <header class="site-header">
      <a href="https://studio.palavara.com/" class="logo-link" aria-label="Palavara Studio">
        <img src="logo.svg" alt="Palavara" class="logo" />
      </a>
    </header>

    <main class="booking-container">

      <!-- Polling / loading state -->
      <section id="step-verifying" class="step active">
        <div class="step-body">
          <div class="loading-overlay static" aria-live="polite">
            <div class="spinner"></div>
            <p>Verifying your payment…</p>
          </div>
        </div>
      </section>

      <!-- Confirmed -->
      <section id="step-confirmed" class="step hidden">
        <div class="step-body">
          <div class="confirm-card">
            <h2>You're booked</h2>
            <p class="confirm-message">Your wheel-throwing workshop is confirmed. See you there.</p>
            <div id="confirmDetails" class="confirm-details">
              <!-- populated by JS -->
            </div>
            <p class="confirm-email-note">A confirmation email is on its way to your inbox.</p>
            <a href="index.html" class="btn btn-ghost confirm-cta">Book another lesson</a>
          </div>
        </div>
      </section>

      <!-- Not yet confirmed (payment still processing) -->
      <section id="step-pending" class="step hidden">
        <div class="step-body">
          <div class="confirm-card">
            <h2>Payment pending</h2>
            <p class="booking-id-label">Booking ID: <code id="pendingBookingId"></code></p>
            <button type="button" id="refreshBtn" class="btn btn-ghost confirm-cta">Refresh status</button>
          </div>
        </div>
      </section>

      <!-- Error -->
      <section id="step-error" class="step hidden">
        <div class="step-body">
          <div class="confirm-card error">
            <div class="confirm-icon">!</div>
            <h2>Something went wrong</h2>
            <p id="errorMsg">Unable to look up your booking.</p>
          </div>
        </div>
        <div class="step-actions">
          <a href="index.html" class="btn btn-ghost">Back to calendar</a>
        </div>
      </section>

    </main>
  </div>

  <script src="config.js"></script>
  <script src="confirm.js"></script>
</body>
</html>
