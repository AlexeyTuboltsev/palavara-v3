<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title data-i18n="page.confirmTitle">Booking confirmed — Palavara Studio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-wrapper">
    <header class="site-header">
      <a href="https://studio.palavara.com/" class="logo-link" aria-label="Palavara Studio">
        <img src="logo.svg" alt="Palavara" class="logo" />
      </a>
    </header>

    <main class="booking-container">

      <!-- Polling / loading state -->
      <section id="step-verifying" class="step active">
        <div class="step-body">
          <div class="loading-overlay static" aria-live="polite">
            <div class="spinner"></div>
            <p data-i18n="confirm.verifying">Verifying your payment…</p>
          </div>
        </div>
      </section>

      <!-- Confirmed -->
      <section id="step-confirmed" class="step hidden">
        <div class="step-body">
          <div class="confirm-card">
            <h2 data-i18n="confirm.title">You're booked</h2>
            <p class="confirm-message" id="confirmMessage">Your workshop is confirmed. See you there.</p>
            <div id="confirmDetails" class="confirm-details">
              <!-- populated by JS -->
            </div>
            <p class="confirm-email-note" data-i18n="confirm.emailNote">A confirmation email is on its way to your inbox.</p>
            <a href="index.html" class="btn btn-ghost confirm-cta"
               data-i18n="confirm.bookAnother">Book another lesson</a>
          </div>
        </div>
      </section>

      <!-- Not yet confirmed (payment still processing) -->
      <section id="step-pending" class="step hidden">
        <div class="step-body">
          <div class="confirm-card">
            <h2 data-i18n="pending.title">Payment pending</h2>
            <p class="booking-id-label">
              <span data-i18n="pending.bookingIdLabel">Booking ID:</span>
              <code id="pendingBookingId"></code>
            </p>
            <button type="button" id="refreshBtn" class="btn btn-ghost confirm-cta"
                    data-i18n="pending.refresh">Refresh status</button>
          </div>
        </div>
      </section>

      <!-- Error -->
      <section id="step-error" class="step hidden">
        <div class="step-body">
          <div class="confirm-card error">
            <div class="confirm-icon">!</div>
            <h2 data-i18n="errorCard.title">Something went wrong</h2>
            <p id="errorMsg">Unable to look up your booking.</p>
          </div>
        </div>
        <div class="step-actions">
          <a href="index.html" class="btn btn-ghost"
             data-i18n="errorCard.backToCalendar">Back to calendar</a>
        </div>
      </section>

    </main>

    <footer class="site-footer">
      <a href="https://studio.palavara.com/impressum">Impressum</a>
      <a href="https://studio.palavara.com/agb">AGB</a>
      <a href="https://studio.palavara.com/datenschutzerklaerung">Datenschutzerklärung</a>
    </footer>
  </div>

  <script src="vendor/i18next.min.js"></script>
  <script src="vendor/i18nextBrowserLanguageDetector.min.js"></script>
  <script src="vendor/i18nextHttpBackend.min.js"></script>
  <script src="config.js"></script>
  <script src="confirm.js"></script>
  <script src="i18n.js"></script>
</body>
</html>
