AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Static hosting for the Palavara scheduler booking page at book.palavara.com.
  S3 (private) + CloudFront with Origin Access Control + Route 53 A-alias.
  Reuses the existing *.palavara.com wildcard ACM cert (us-east-1).
  Deploy region: us-east-1 (CloudFront stacks live in us-east-1 by convention
  so they can reference us-east-1 ACM certs without cross-region resources).

Parameters:
  DomainName:
    Type: String
    Default: book.palavara.com
    Description: Subdomain to serve the scheduler frontend
  HostedZoneId:
    Type: String
    Default: Z05430123DI4LRRE253BB
    Description: Route 53 hosted zone ID for palavara.com
  CertificateArn:
    Type: String
    Default: arn:aws:acm:us-east-1:014032150254:certificate/259f342f-2acf-42c7-b2cd-1699291dd113
    Description: ACM cert ARN (us-east-1) covering DomainName

Resources:

  # ── S3 bucket (private; CloudFront reads via OAC) ───────────────────────────
  Bucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref DomainName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${Bucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution}"

  # ── CloudFront ─────────────────────────────────────────────────────────────
  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${DomainName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "Scheduler frontend — ${DomainName}"
        Aliases:
          - !Ref DomainName
        DefaultRootObject: index.html
        HttpVersion: http2and3
        IPV6Enabled: true
        PriceClass: PriceClass_100
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt Bucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''
            OriginAccessControlId: !GetAtt OriginAccessControl.Id
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          Compress: true
          # AWS-managed CachingOptimized
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          # AWS-managed SecurityHeadersPolicy
          ResponseHeadersPolicyId: 67f7725c-6f97-4210-82d7-5512b31e9d03
        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        # Real 404s for missing files (no SPA fallback — this is a static site).

  # ── DNS ────────────────────────────────────────────────────────────────────
  AliasRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt Distribution.DomainName
        # CloudFront's hosted zone for alias targets — fixed AWS-wide constant.
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

Outputs:
  BucketName:
    Description: S3 bucket — sync scheduler/frontend/* here
    Value: !Ref Bucket
  DistributionId:
    Description: CloudFront distribution ID — for invalidations
    Value: !Ref Distribution
  DistributionDomainName:
    Description: CloudFront distribution domain (DNS A-alias points here)
    Value: !GetAtt Distribution.DomainName
  Url:
    Description: Public URL once DNS propagates
    Value: !Sub "https://${DomainName}/"
