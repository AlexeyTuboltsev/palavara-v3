AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Palavara Scheduler — calendar booking with PayPal Orders v2 (REST + Webhooks v2)
  Lambda + API Gateway + DynamoDB (eu-central-1)

Globals:
  Function:
    Runtime: nodejs22.x
    Timeout: 15
    MemorySize: 256
    Environment:
      Variables:
        BOOKINGS_TABLE: !Ref BookingsTable
        SLOTS_TABLE: !Ref SlotsTable
        PAYPAL_CLIENT_ID: !Ref PayPalClientId
        PAYPAL_CLIENT_SECRET: !Ref PayPalClientSecret
        PAYPAL_API_BASE: !Ref PayPalApiBase
        PAYPAL_RETURN_URL: !Ref PayPalReturnUrl
        PAYPAL_CANCEL_URL: !Ref PayPalCancelUrl
        PAYPAL_WEBHOOK_ID: !Ref PayPalWebhookId
        PRICE_CENTS: "9500"                   # legacy fallback only — real price now per-lesson-type
        PRICE_CURRENCY: "EUR"
        SES_FROM_ADDRESS: !Ref SesFromAddress
        SES_REPLY_TO: !Ref SesReplyTo
        OWNER_NOTIFY_ADDRESS: !Ref OwnerNotifyAddress
        CANCEL_URL_BASE: !Ref CancelUrlBase
        CANCEL_TOKEN_SECRET: !Ref CancelTokenSecret
        ADMIN_SECRET: !Ref AdminSecret
        GOOGLE_CLIENT_ID: !Ref GoogleClientId
        GOOGLE_CLIENT_SECRET: !Ref GoogleClientSecret
        GOOGLE_CALENDAR_ID: !Ref GoogleCalendarId
        GOOGLE_OAUTH_REDIRECT_URI: !Ref GoogleOAuthRedirectUri
        GOOGLE_REFRESH_TOKEN_PARAM_NAME: !Ref GoogleRefreshTokenParamName
  Api:
    Cors:
      AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,X-Admin-Secret'"
      AllowOrigin: "'*'"

Parameters:
  PayPalClientId:
    Type: String
    Description: PayPal REST app Client ID (from developer.paypal.com)
  PayPalClientSecret:
    Type: String
    NoEcho: true
    Description: PayPal REST app Client Secret
  PayPalApiBase:
    Type: String
    Default: https://api-m.sandbox.paypal.com
    AllowedValues:
      - https://api-m.sandbox.paypal.com
      - https://api-m.paypal.com
    Description: PayPal REST API base URL — sandbox or live
  PayPalReturnUrl:
    Type: String
    Description: URL PayPal redirects to after the buyer approves payment
    Default: https://REPLACE_WITH_YOUR_DOMAIN/scheduler/confirm.html
  PayPalCancelUrl:
    Type: String
    Description: URL PayPal redirects to when the buyer cancels payment
    Default: https://REPLACE_WITH_YOUR_DOMAIN/scheduler/index.html
  PayPalWebhookId:
    Type: String
    Default: ""
    Description: >
      PayPal Webhook ID (configured in the PayPal app dashboard).
      Leave empty to reject all webhooks until configured.
  SesFromAddress:
    Type: String
    Default: "Palavara Studio <bookings@studio.palavara.com>"
    Description: >
      Verified SES sender for confirmation emails. The studio.palavara.com
      domain (or this specific email) must be verified in SES eu-central-1.
  SesReplyTo:
    Type: String
    Default: "palavarastudio@gmail.com"
    Description: Reply-To address for student confirmation emails.
  OwnerNotifyAddress:
    Type: String
    Default: "palavarastudio@gmail.com"
    Description: >
      Where the studio-side "new booking" notification email lands. Reply-To
      on those emails is set to the booker so the owner can reply directly.
  CancelUrlBase:
    Type: String
    Default: "https://book.palavara.com/cancel.html"
    Description: Public URL of the static cancel page (where the cancel link points).
  CancelTokenSecret:
    Type: String
    NoEcho: true
    Description: >
      HMAC secret used to sign cancellation tokens in the confirmation email.
      Generate once with `openssl rand -hex 32`. Rotating invalidates all
      outstanding cancellation links.
  AdminSecret:
    Type: String
    NoEcho: true
    Description: >
      Shared secret required in the X-Admin-Secret header on /admin endpoints.
      Generate with `openssl rand -hex 32`. Use only over HTTPS.
  GoogleClientId:
    Type: String
    Default: ""
    Description: >
      Google OAuth 2.0 Client ID (Web application) for the Calendar API.
      Leave empty to disable Google Calendar sync.
  GoogleClientSecret:
    Type: String
    Default: ""
    NoEcho: true
    Description: Google OAuth 2.0 Client Secret matching GoogleClientId.
  GoogleCalendarId:
    Type: String
    Default: "primary"
    Description: >
      Calendar ID to write events to. "primary" = the OAuth'd user's
      default calendar; or pass a specific calendar id like
      "abcdef@group.calendar.google.com".
  GoogleRefreshTokenParamName:
    Type: String
    Default: "/palavara/google-refresh-token"
    Description: >
      SSM Parameter Store name (SecureString) where the refresh token
      lives. Created automatically by the OAuth callback handler on
      first successful consent.
  GoogleOAuthRedirectUri:
    Type: String
    Default: "https://74c5ex58qa.execute-api.eu-central-1.amazonaws.com/Prod/admin/google/oauth/callback"
    Description: >
      OAuth redirect URI registered in the Google Cloud OAuth client.
      Hardcoded by default to the existing API Gateway invoke URL —
      avoids a circular dependency between Lambdas (which need the URL
      as an env var) and the API (which depends on the Lambdas).
      Update if the API Gateway is ever recreated with a new id.
  PendingTtlMinutes:
    Type: Number
    Default: 30
    MinValue: 5
    MaxValue: 180
    Description: >
      How long an abandoned `pending` booking is allowed to live before
      the auto-expire Lambda flips it to `expired` and frees its seat.
      Capped at 180 since PayPal Orders v2 orders expire after ~3 h anyway.

Resources:

  # ── DynamoDB ────────────────────────────────────────────────────────────────
  BookingsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: palavara-bookings
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: date
          AttributeType: S
        - AttributeName: timeSlot
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: date-index
          KeySchema:
            - AttributeName: date
              KeyType: HASH
            - AttributeName: timeSlot
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  SlotsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: palavara-slots
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: date
          AttributeType: S
        - AttributeName: start
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: date-index
          KeySchema:
            - AttributeName: date
              KeyType: HASH
            - AttributeName: start
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  LessonTypesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: palavara-lesson-types
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # ── Lambda functions ─────────────────────────────────────────────────────────
  GetDatesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: palavara-get-dates
      CodeUri: backend/
      Handler: src/handlers/getDates.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SlotsTable
        - DynamoDBReadPolicy:
            TableName: !Ref BookingsTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /dates
            Method: get

  GetLessonTypesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: palavara-get-lesson-types
      CodeUri: backend/
      Handler: src/handlers/getLessonTypes.handler
      Environment:
        Variables:
          LESSON_TYPES_TABLE: !Ref LessonTypesTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref LessonTypesTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /lesson-types
            Method: get

  GetAvailabilityFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: palavara-get-availability
      CodeUri: backend/
      Handler: src/handlers/getAvailability.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref BookingsTable
        - DynamoDBReadPolicy:
            TableName: !Ref SlotsTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /availability
            Method: get

  CreateBookingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: palavara-create-booking
      CodeUri: backend/
      Handler: src/handlers/createBooking.handler
      Environment:
        Variables:
          LESSON_TYPES_TABLE: !Ref LessonTypesTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref BookingsTable
        - DynamoDBReadPolicy:
            TableName: !Ref SlotsTable
        - DynamoDBReadPolicy:
            TableName: !Ref LessonTypesTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /bookings
            Method: post

  GetBookingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: palavara-get-booking
      CodeUri: backend/
      Handler: src/handlers/getBooking.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref BookingsTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /bookings/{id}
            Method: get

  CaptureOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: palavara-capture-order
      CodeUri: backend/
      Handler: src/handlers/captureOrder.handler
      Timeout: 30
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref BookingsTable
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: '*'
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${GoogleRefreshTokenParamName}"
      Events:
        Api:
          Type: Api
          Properties:
            Path: /bookings/{id}/capture
            Method: post

  PayPalWebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: palavara-paypal-webhook
      CodeUri: backend/
      Handler: src/handlers/paypalWebhook.handler
      Timeout: 30
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref BookingsTable
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: '*'
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${GoogleRefreshTokenParamName}"
      Events:
        Api:
          Type: Api
          Properties:
            Path: /webhooks/paypal
            Method: post

  # Scheduled sweep that flips abandoned `pending` bookings to `expired`
  # so their seats free up. Runs every 5 min via EventBridge — keeps the
  # worst-case phantom-reservation window to ~5 min + the configured TTL.
  ExpirePendingBookingsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: palavara-expire-pending-bookings
      CodeUri: backend/
      Handler: src/handlers/expirePendingBookings.handler
      Timeout: 60
      Environment:
        Variables:
          PENDING_TTL_MINUTES: !Ref PendingTtlMinutes
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref BookingsTable
      Events:
        Schedule:
          Type: Schedule
          Properties:
            Schedule: rate(5 minutes)
            Description: Auto-expire abandoned pending bookings
            Enabled: true

  CancelBookingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: palavara-cancel-booking
      CodeUri: backend/
      Handler: src/handlers/cancelBooking.handler
      Timeout: 30
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref BookingsTable
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: '*'
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${GoogleRefreshTokenParamName}"
      Events:
        Api:
          Type: Api
          Properties:
            Path: /bookings/{id}/cancel
            Method: post

  AdminCancelBookingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: palavara-admin-cancel-booking
      CodeUri: backend/
      Handler: src/handlers/adminCancelBooking.handler
      Timeout: 30
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref BookingsTable
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: '*'
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${GoogleRefreshTokenParamName}"
      Events:
        Api:
          Type: Api
          Properties:
            Path: /admin/bookings/{id}/cancel
            Method: post

  AdminCreateBookingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: palavara-admin-create-booking
      CodeUri: backend/
      Handler: src/handlers/adminCreateBooking.handler
      Timeout: 30
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref BookingsTable
        - DynamoDBReadPolicy:
            TableName: !Ref SlotsTable
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: '*'
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${GoogleRefreshTokenParamName}"
      Events:
        Api:
          Type: Api
          Properties:
            Path: /admin/bookings
            Method: post

  GoogleOauthStartFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: palavara-google-oauth-start
      CodeUri: backend/
      Handler: src/handlers/adminGoogleOauthStart.handler
      Timeout: 10
      Events:
        Api:
          Type: Api
          Properties:
            Path: /admin/google/oauth/start
            Method: get

  GoogleOauthCallbackFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: palavara-google-oauth-callback
      CodeUri: backend/
      Handler: src/handlers/adminGoogleOauthCallback.handler
      Timeout: 30
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - ssm:PutParameter
                - ssm:GetParameter
              Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${GoogleRefreshTokenParamName}"
      Events:
        Api:
          Type: Api
          Properties:
            Path: /admin/google/oauth/callback
            Method: get

  AdminListSlotsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: palavara-admin-list-slots
      CodeUri: backend/
      Handler: src/handlers/adminListSlots.handler
      Timeout: 15
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SlotsTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /admin/slots
            Method: get

  AdminCreateSlotsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: palavara-admin-create-slots
      CodeUri: backend/
      Handler: src/handlers/adminCreateSlots.handler
      Timeout: 30
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SlotsTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /admin/slots
            Method: post

  AdminCancelSlotFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: palavara-admin-cancel-slot
      CodeUri: backend/
      Handler: src/handlers/adminCancelSlot.handler
      Timeout: 15
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SlotsTable
        - DynamoDBReadPolicy:
            TableName: !Ref BookingsTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /admin/slots/{id}
            Method: delete

  AdminListBookingsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: palavara-admin-list-bookings
      CodeUri: backend/
      Handler: src/handlers/adminListBookings.handler
      Timeout: 15
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref BookingsTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /admin/bookings
            Method: get

  # ── Admin: lesson-type catalog ───────────────────────────────────────────
  AdminListLessonTypesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: palavara-admin-list-lesson-types
      CodeUri: backend/
      Handler: src/handlers/adminListLessonTypes.handler
      Environment:
        Variables:
          LESSON_TYPES_TABLE: !Ref LessonTypesTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref LessonTypesTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /admin/lesson-types
            Method: get

  AdminCreateLessonTypeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: palavara-admin-create-lesson-type
      CodeUri: backend/
      Handler: src/handlers/adminCreateLessonType.handler
      Environment:
        Variables:
          LESSON_TYPES_TABLE: !Ref LessonTypesTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref LessonTypesTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /admin/lesson-types
            Method: post

  AdminUpdateLessonTypeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: palavara-admin-update-lesson-type
      CodeUri: backend/
      Handler: src/handlers/adminUpdateLessonType.handler
      Environment:
        Variables:
          LESSON_TYPES_TABLE: !Ref LessonTypesTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref LessonTypesTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /admin/lesson-types/{id}
            Method: put

  AdminDeleteLessonTypeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: palavara-admin-delete-lesson-type
      CodeUri: backend/
      Handler: src/handlers/adminDeleteLessonType.handler
      Environment:
        Variables:
          LESSON_TYPES_TABLE: !Ref LessonTypesTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref LessonTypesTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /admin/lesson-types/{id}
            Method: delete

Outputs:
  ApiBaseUrl:
    Description: API Gateway base URL — put this in frontend/config.js
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"
  WebhookUrl:
    Description: Configure this URL in the PayPal app dashboard (Webhooks → Add)
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/webhooks/paypal"
  BookingsTableName:
    Description: DynamoDB table name
    Value: !Ref BookingsTable
