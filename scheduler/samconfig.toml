version = 0.1

[default.deploy.parameters]
stack_name = "palavara-scheduler"
region = "eu-central-1"
confirm_changeset = false
capabilities = "CAPABILITY_IAM"
# Real credentials are NOT in this file. Pass them on each deploy via:
#   sam deploy --parameter-overrides \
#     PayPalClientId=$PAYPAL_CLIENT_ID \
#     PayPalClientSecret=$PAYPAL_CLIENT_SECRET \
#     PayPalReturnUrl=https://studio.palavara.com/scheduler/confirm.html \
#     PayPalCancelUrl=https://studio.palavara.com/scheduler/index.html \
#     PayPalWebhookId=$PAYPAL_WEBHOOK_ID
#
# CloudFormation will reuse previously-supplied parameter values for any
# parameter you don't pass on a subsequent deploy.
parameter_overrides = [
  "PayPalApiBase=https://api-m.sandbox.paypal.com",
]
resolve_s3 = true
