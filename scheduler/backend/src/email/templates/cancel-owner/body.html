<!DOCTYPE html>
<html><body style="font-family: -apple-system, Segoe UI, Roboto, sans-serif; color: #111; line-height: 1.55;">
  <p>A booking has been cancelled by the <strong>{{cancelledBy}}</strong>.</p>
  <table cellpadding="4" style="border-collapse: collapse; margin: 12px 0;">
    <tr><td style="color:#6b7280">Booker</td><td>{{studentName}} &lt;<a href="mailto:{{studentEmail}}">{{studentEmail}}</a>&gt;</td></tr>
    <tr><td style="color:#6b7280">Date</td><td><strong>{{dateLine}}</strong></td></tr>
    <tr><td style="color:#6b7280">Time</td><td><strong>{{timeLine}}</strong></td></tr>
    <tr><td style="color:#6b7280">Booking ID</td><td><code>{{bookingId}}</code></td></tr>
  </table>
  <p>{{refundLine}}</p>
  <p style="color:#6b7280; font-size: 13px;">The slot is now available for other bookings. A calendar update is attached.</p>
</body></html>
