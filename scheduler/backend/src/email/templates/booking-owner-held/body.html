<!DOCTYPE html>
<html><body style="font-family: -apple-system, Segoe UI, Roboto, sans-serif; color: #111; line-height: 1.55;">
  <p>A slot has been held in the schedule{{paymentNoteDashedHtml}}.</p>
  <table cellpadding="4" style="border-collapse: collapse; margin: 12px 0;">
    <tr><td style="color:#6b7280">Date</td><td><strong>{{dateLine}}</strong></td></tr>
    <tr><td style="color:#6b7280">Time</td><td><strong>{{timeLine}}</strong></td></tr>
    {{{paymentNoteRowHtml}}}
    <tr><td style="color:#6b7280">Booking ID</td><td><code>{{bookingId}}</code></td></tr>
  </table>
  <p style="margin: 16px 0;">
    <a href="{{gcalUrl}}" style="display:inline-block;background:#1a73e8;color:#fff;text-decoration:none;padding:8px 16px;border-radius:4px;">
      Add to Google Calendar
    </a>
    <span style="color:#6b7280; font-size: 13px; margin-left: 8px;">(or open the attached calendar invite)</span>
  </p>
</body></html>
