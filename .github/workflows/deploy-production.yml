name: Deploy to Production

on:
  workflow_dispatch: # Manual triggering only

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build production bundle
        run: yarn build
        env:
          REACT_APP_SENTRY: ${{ secrets.REACT_APP_SENTRY }}
          REACT_APP_IMG_PREFIX: https://be.palavara.com/img/studio
          REACT_APP_USE_OPTIMIZED_IMAGES: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Sync to S3
        run: |
          # Two-pass sync. Without this, index.html inherits the immutable
          # 1-year cache and clients keep loading stale HTML after a deploy
          # (CloudFront invalidation only refreshes the edge, not browsers).

          # 1. Hashed assets — content-addressed, cache for a year.
          aws s3 sync build/ s3://studio.palavara.com \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "asset-manifest.json" \
            --exclude "manifest.json" \
            --exclude "robots.txt" \
            --exclude "sitemap.xml" \
            --exclude "*.html"

          # 2. SPA shell + meta — short cache, must revalidate.
          aws s3 cp build/index.html s3://studio.palavara.com/index.html \
            --cache-control "public, max-age=300, must-revalidate" \
            --content-type "text/html; charset=utf-8"

          for f in asset-manifest.json manifest.json robots.txt sitemap.xml 404.html; do
            if [ -f "build/$f" ]; then
              aws s3 cp "build/$f" "s3://studio.palavara.com/$f" \
                --cache-control "public, max-age=300, must-revalidate"
            fi
          done

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E3HIR7ZV6FCTFO \
            --paths "/*"
