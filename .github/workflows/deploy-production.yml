name: Deploy to Production

on:
  workflow_dispatch: # Manual triggering only

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build production bundle
        run: yarn build
        env:
          REACT_APP_SENTRY: ${{ secrets.REACT_APP_SENTRY }}
          REACT_APP_IMG_PREFIX: https://be.palavara.com/img/studio
          REACT_APP_USE_OPTIMIZED_IMAGES: true

      - name: Generate per-route prerendered HTML
        # Writes build/<slug>.html for each non-home route with the
        # route-specific <title>, <meta description>, OG tags, canonical
        # baked in. Crawlers and link-preview scrapers (Telegram, FB, etc.)
        # don't run JS, so without this they all see the home page meta.
        run: node scripts/generate-route-html.js

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Sync to S3
        run: |
          # 1. Hashed assets in /static/ — immutable, --delete to clean
          #    up old content-addressed files from previous deploys.
          aws s3 sync build/static/ s3://studio.palavara.com/static/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable"

          # 2. Other long-cache root-level dirs (favicons etc.). No
          #    --delete here — keys without local sources (the per-route
          #    /<slug> keys we upload below) would otherwise be removed.
          aws s3 sync build/ s3://studio.palavara.com \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "static/*" \
            --exclude "*.html" \
            --exclude "asset-manifest.json" \
            --exclude "manifest.json" \
            --exclude "robots.txt" \
            --exclude "sitemap.xml"

          # 3. SPA shell — short cache so a new deploy reaches users
          #    quickly even though CloudFront's edge has been invalidated.
          aws s3 cp build/index.html s3://studio.palavara.com/index.html \
            --cache-control "public, max-age=300, must-revalidate" \
            --content-type "text/html; charset=utf-8"

          # 4. Meta files (manifest, robots, sitemap, optional 404).
          for f in asset-manifest.json manifest.json robots.txt sitemap.xml 404.html; do
            if [ -f "build/$f" ]; then
              aws s3 cp "build/$f" "s3://studio.palavara.com/$f" \
                --cache-control "public, max-age=300, must-revalidate"
            fi
          done

          # 5. Per-route prerendered HTML. Uploaded as s3://.../<slug>
          #    (no extension) with Content-Type: text/html so CloudFront
          #    serves it directly for /<slug>. The SPA's normal 404→
          #    /index.html fallback still handles any unrouted URL.
          for f in build/*.html; do
            name=$(basename "$f" .html)
            [ "$name" = "index" ] && continue
            [ "$name" = "404" ] && continue
            aws s3 cp "$f" "s3://studio.palavara.com/$name" \
              --cache-control "public, max-age=300, must-revalidate" \
              --content-type "text/html; charset=utf-8"
          done

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E3HIR7ZV6FCTFO \
            --paths "/*"
