name: PR Staging

on:
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  pull-requests: write

jobs:
  tests:
    if: github.event.action != 'closed'
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.0-noble
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run visual regression tests
        run: HOME=/root npx playwright test
        env:
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload visual diff images
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: visual-diff-images
          path: |
            e2e/**/*-diff.png
            e2e/**/*-actual.png
          retention-days: 30

  deploy-staging:
    needs: tests
    if: github.event.action != 'closed'
    uses: ./.github/workflows/deploy-staging.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
      ref: ${{ github.event.pull_request.head.sha }}
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      REACT_APP_SENTRY: ${{ secrets.REACT_APP_SENTRY }}
      STAGING_CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.STAGING_CLOUDFRONT_DISTRIBUTION_ID }}

  cleanup-staging:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Delete PR prefix from S3
        run: |
          aws s3 rm s3://staging.studio.palavara.com/pr-${{ github.event.pull_request.number }}/ \
            --recursive

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.STAGING_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/pr-${{ github.event.pull_request.number }}/*"
