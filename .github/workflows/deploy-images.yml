name: Deploy Optimized Images

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Force re-optimization of all images'
        type: boolean
        default: false
        required: false

jobs:
  optimize-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Optimize images
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            echo "🔄 Force re-optimizing all images..."
            yarn optimize-images --force
          else
            echo "⚡ Optimizing new/modified images only..."
            yarn optimize-images
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Deploy to S3/CloudFront
        run: |
          echo "🚀 Deploying optimized images to CDN..."
          ./scripts/deploy-images.sh

      - name: Open PR with updated manifest
        # Pushing directly to protected main is denied to github-actions[bot].
        # Instead, open a PR from a bot branch — easy to merge or close.
        # No-ops if there are no manifest changes.
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          add-paths: public/img/image-manifest.json
          commit-message: "Update image manifest after optimization"
          author: "k5qkop-bot <tblz+k5qkop-bot@proton.me>"
          branch: bot/update-image-manifest
          delete-branch: true
          title: "Update image manifest after optimization"
          body: |
            Automated update from the **Deploy Optimized Images** workflow run #${{ github.run_number }}.

            The image variants and the manifest have already been deployed to the CDN.
            Merging this PR keeps the repo's `public/img/image-manifest.json` in sync so
            local `yarn optimize-images` runs don't re-process already-optimized images.
